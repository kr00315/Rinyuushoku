<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ふたりの離乳食ノート</title>
<style>
:root{--bg:#fffaf4;--card:#fff;--ink:#3a3028;--sub:#8d7c6d;--line:#eadfd2;--accent:#d9795f;--soft:#fff0e8;--green:#718b68}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,"Yu Gothic",sans-serif;line-height:1.6;padding-bottom:74px}header{padding:22px 18px 15px;background:linear-gradient(135deg,#fff7e9,#ffe8df);border-bottom:1px solid var(--line)}h1{margin:0;font-size:22px}header p{margin:2px 0 0;color:var(--sub);font-size:13px}main{max-width:680px;margin:auto;padding:14px}.search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;font-size:16px;background:#fff}.chips{display:flex;gap:7px;overflow:auto;padding:12px 0}.chip,.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 12px;font-weight:700}.chip.on,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:0 2px 8px #6d4b2610}.card h2{font-size:16px;line-height:1.35;margin:0 0 8px}.stage{font-size:12px;color:var(--green);font-weight:800}.tags{color:var(--sub);font-size:12px;margin:8px 0}.card button{width:100%;margin-top:8px}.empty{text-align:center;color:var(--sub);padding:35px 10px}.detail{position:fixed;inset:0;background:var(--bg);z-index:3;overflow:auto;display:none}.detail.on{display:block}.detail .bar{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);padding:11px 14px;display:flex;gap:10px;align-items:center}.detail .bar strong{flex:1}.detail .inner{max-width:680px;margin:auto;padding:18px}.detail h2{font-size:24px}.box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.box li{margin:5px 0}nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:2}nav button{flex:1;border:0;background:none;padding:10px 4px;color:var(--sub);font-weight:700}nav button.on{color:var(--accent)}.share{margin-top:18px;padding:14px;background:var(--soft);border-radius:15px;font-size:13px}.share button{margin:7px 5px 0 0}.count{color:var(--accent);font-size:13px}
</style><header><h1>ふたりの離乳食ノート <span id="count" class="count"></span></h1><p>迷ったときに、ふたりで同じレシピを見られる場所</p></header><main id="main"></main><div id="detail" class="detail"><div class="bar"><button class="btn" id="back">← 戻る</button><strong id="title"></strong><button class="btn" id="fav"></button></div><div class="inner" id="body"></div></div><nav><button id="recipesTab" class="on">🍽️<br>レシピ</button><button id="favTab">♡<br>お気に入り</button><button id="shareTab">⇄<br>共有</button></nav>
<script>
const RECIPES=[{"id":"tofu-pancake","name":"豆腐でふわふわパンケーキ","stage":"9〜11か月頃","tags":["主食","手づかみ"],"ingredients":[["ホットケーキミックス","100g"],["絹ごし豆腐","70g"],["牛乳または豆乳","75ml"],["オリーブオイル","適量"]],"steps":["豆腐をボウルに入れてなめらかになるまで混ぜる。","ホットケーキミックスと牛乳を加えて混ぜる。","フライパンにオリーブオイルを薄くひき、小さく焼く。"],"note":"食べやすい大きさに切って冷凍できます。"},{"id":"salmon-hijiki","name":"鮭とひじきの炊き込みがゆ","stage":"9〜11か月頃","tags":["主食","冷凍ストック"],"ingredients":[["米","1/2合"],["生鮭","1切れ（60g）"],["乾燥芽ひじき","全量"],["にんじん","適量"],["いんげん","2本"],["昆布","3cm"],["水","450ml"],["しょうゆ","小さじ1/2"]],"steps":["鮭は骨を取り、炊飯器にすべての材料を入れて炊飯する。","炊けたら鮭の皮と昆布を取り除き、混ぜ合わせる。","1食分ずつ分けて冷凍する。"],"note":"鮭の骨は必ず確認してください。"},{"id":"apple-sweet-potato","name":"りんごとさつまいものおやき","stage":"9〜11か月頃","tags":["おやつ","手づかみ"],"ingredients":[["りんご","25g"],["さつまいも","100g"],["片栗粉","大さじ1"],["無塩バター","3g"]],"steps":["りんごとさつまいもをやわらかく加熱してつぶす。","片栗粉を加えて混ぜ、小判形に成形する。","バターをひいたフライパンで両面を焼く。"]},{"id":"chicken-potato","name":"鶏肉じゃが","stage":"9〜11か月頃","tags":["主菜","冷凍ストック"],"ingredients":[["鶏ひき肉","70g"],["じゃがいも","大さじ2"],["にんじん","大さじ2"],["玉ねぎ","大さじ1"],["いんげん","大さじ1"],["だし汁","100ml"],["しょうゆ","小さじ1/2"]],"steps":["野菜を食べやすい大きさに切る。","鍋に材料を入れ、やわらかくなるまで煮る。","1食分ずつ分けて冷凍する。"]},{"id":"cod-dashi","name":"たらのだし煮","stage":"9〜11か月頃","tags":["主菜","魚"],"ingredients":[["たら","全量（60g）"],["玉ねぎ","大さじ2"],["だし汁","75ml"],["青のり","適量"]],"steps":["たらをゆでて、皮と骨を取り除く。","だし汁で玉ねぎを煮て、たらを加える。","食べるときに青のりをふる。"]},{"id":"vegetable-miso","name":"野菜たっぷりみそ汁","stage":"9〜11か月頃","tags":["汁物","野菜"],"ingredients":[["にんじん","大さじ2"],["玉ねぎ","大さじ2"],["小松菜","全量（15g）"],["だし汁","130ml"],["みそ","小さじ1/2"]],"steps":["野菜をだし汁でやわらかく煮る。","火を止め、温度が下がったらみそを溶かす。"],"note":"下準備で余った野菜とだし汁を活用できます。"},{"id":"carrot-potage","name":"にんじんのポタージュ","stage":"9〜11か月頃","tags":["汁物","野菜"],"ingredients":[["にんじん","大さじ4"],["じゃがいも","大さじ2"],["玉ねぎ","大さじ1"],["牛乳または豆乳","80ml"],["ベビー用コンソメ","小さじ1"]],"steps":["すべての材料をやわらかく加熱する。","ブレンダーまたはこし器でペースト状にする。"]},{"id":"tofu-hamburg","name":"豆腐ハンバーグ","stage":"9〜11か月頃","tags":["主菜","手づかみ"],"ingredients":[["鶏ひき肉","60g"],["絹ごし豆腐","35g"],["玉ねぎ","大さじ2"],["にんじん","大さじ1"],["片栗粉","小さじ2"]],"steps":["材料をボウルでよく混ぜる。","小判形に成形し、フライパンで両面を焼く。","少量の水を加えて蒸し焼きにする。"]},{"id":"meatball","name":"赤ちゃんミートボール","stage":"9〜11か月頃","tags":["主菜","冷凍ストック"],"ingredients":[["豚ひき肉","120g"],["玉ねぎ","大さじ2"],["にんじん","大さじ1"],["ピーマン","小さじ1"],["絹ごし豆腐","35g"],["片栗粉","小さじ2"]],"steps":["材料を混ぜ、ひと口サイズに丸める。","フライパンで転がしながら焼く。","野菜入りソースで煮からめる。"]},{"id":"corn-potage","name":"コーンポタージュ","stage":"9〜11か月頃","tags":["汁物","野菜"],"ingredients":[["コーン","100g"],["無塩バター","3g"],["牛乳または豆乳","120ml"],["青のり","適量"]],"steps":["コーンと牛乳以外を耐熱容器に入れて加熱する。","牛乳を加えてブレンダーでペースト状にする。","食べるときに青のりをふる."]},{"id":"udon-napolitan","name":"うどんナポリタン","stage":"1歳〜1歳半頃","tags":["主食","麺"],"ingredients":[["ゆでうどん","1玉"],["豚肉","適量"],["玉ねぎ・にんじん","適量"],["ケチャップ","適量"]],"steps":["具材を細かく切って炒める。","うどんと調味料を加えて炒め合わせる。"]},{"id":"japanese-yaki-udon","name":"和風焼きうどん","stage":"1歳〜1歳半頃","tags":["主食","麺"],"ingredients":[["ゆでうどん","1玉"],["豚肉","適量"],["玉ねぎ・にんじん","適量"],["しょうゆ","少々"]],"steps":["具材を炒め、うどんを加える。","だしとしょうゆで味を整える。"]},{"id":"shirasu-nori","name":"しらすと青のりのごはんおやき","stage":"1歳〜1歳半頃","tags":["主食","手づかみ"],"ingredients":[["ごはん","160g"],["しらす干し","30g"],["青のり","小さじ1/2"],["片栗粉","適量"]],"steps":["材料を混ぜ、食べやすい形にする。","フライパンで両面を焼く。"]},{"id":"tuna-ketchup-rice","name":"ツナケチャップライスおやき","stage":"1歳〜1歳半頃","tags":["主食","手づかみ"],"ingredients":[["ごはん","160g"],["ツナ水煮","35g"],["玉ねぎ","40g"],["ケチャップ","小さじ2"],["片栗粉","適量"]],"steps":["ツナと玉ねぎを加熱し、ごはんと混ぜる。","形を整えて両面を焼く。"]},{"id":"tororo-rice","name":"とろろごはんおやき","stage":"1歳〜1歳半頃","tags":["主食","手づかみ"],"ingredients":[["ごはん","160g"],["長いも","80g"],["青のり","小さじ1/2"],["しょうゆ","小さじ1/2"]],"steps":["材料を混ぜ、食べやすい形にする。","フライパンで両面を焼く。"]},{"id":"wrapped-shumai","name":"包まないシュウマイ","stage":"1歳〜1歳半頃","tags":["主菜","冷凍ストック"],"ingredients":[["豚ひき肉","150g"],["シュウマイの皮","5枚"],["玉ねぎ","80g"],["片栗粉","大さじ1"]],"steps":["材料を混ぜて丸め、細切りにした皮をまぶす。","フライパンに並べ、水を加えて蒸し焼きにする。"]},{"id":"pumpkin-croquette","name":"揚げないかぼちゃコロッケ","stage":"1歳〜1歳半頃","tags":["主菜","手づかみ"],"ingredients":[["かぼちゃ","300g"],["玉ねぎ","40g"],["パン粉","適量"],["油","少々"]],"steps":["かぼちゃを加熱してつぶし、具材と混ぜる。","成形してパン粉をまぶし、フライパンで焼く。"]}],FAV='baby.favorites',tabState={tab:'recipes',stage:null,q:''};let fav=new Set(JSON.parse(localStorage.getItem(FAV)||'[]'),);const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function save(){localStorage.setItem(FAV,JSON.stringify([...fav]));$('#count').textContent=fav.size?'・お気に入り '+fav.size:''}function render(){let a=RECIPES.filter(r=>(!tabState.stage||r.stage===tabState.stage)&&(!tabState.q||r.name.includes(tabState.q)||r.tags.join().includes(tabState.q))&&(tabState.tab==='fav'?fav.has(r.id):1));$('#main').innerHTML=`<input class="search" placeholder="レシピ名や食材で検索" value="${esc(tabState.q)}"><div class="chips"><button class="chip ${!tabState.stage?'on':''}" data-stage="">すべて</button>${[...new Set(RECIPES.map(r=>r.stage))].map(s=>`<button class="chip ${tabState.stage===s?'on':''}" data-stage="${s}">${s}</button>`).join('')}</div>${a.length?`<div class="grid">${a.map(r=>`<article class="card"><div class="stage">${r.stage}</div><h2>${r.name}</h2><div class="tags">${r.tags.map(t=>'#'+t).join('　')}</div><button class="btn ${fav.has(r.id)?'primary':''}" data-fav="${r.id}">${fav.has(r.id)?'♥ 保存済み':'♡ お気に入り'}</button><button class="btn" data-open="${r.id}">レシピを見る</button></article>`).join('')}</div>`:'<div class="empty">該当するレシピがありません</div>'}`;$('#main').querySelector('.search').oninput=e=>{tabState.q=e.target.value;render()}}function open(id){let r=RECIPES.find(x=>x.id===id);$('#title').textContent=r.name;$('#fav').textContent=fav.has(id)?'♥':'♡';$('#body').innerHTML=`<div class="stage">${r.stage}</div><h2>${r.name}</h2><h3>材料</h3><ul class="box">${r.ingredients.map(i=>`<li>${i[0]}：<b>${i[1]}</b></li>`).join('')}</ul><h3>作り方</h3><ol class="box">${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>${r.note?`<div class="share">📝 ${r.note}</div>`:''}`;$('#detail').classList.add('on');$('#fav').onclick=()=>{fav.has(id)?fav.delete(id):fav.add(id);save();open(id)}}document.body.onclick=e=>{let t=e.target.closest('[data-open],[data-fav],[data-stage]');if(!t)return;if(t.dataset.open)open(t.dataset.open);if(t.dataset.fav){fav.has(t.dataset.fav)?fav.delete(t.dataset.fav):fav.add(t.dataset.fav);save();render()}if(t.dataset.stage!==undefined){tabState.stage=t.dataset.stage||null;render()}};$('#back').onclick=()=>$('#detail').classList.remove('on');$('#recipesTab').onclick=()=>{tabState.tab='recipes';render()};$('#favTab').onclick=()=>{tabState.tab='fav';render()};$('#shareTab').onclick=()=>{$('#main').innerHTML=`<div class="share"><h2>ふたりで共有する</h2><p>お気に入り情報を文字データにして、もう一方の端末へ送れます。</p><button class="btn primary" id="export">共有データを書き出す</button><button class="btn" id="import">共有データを読み込む</button><textarea id="data" style="width:100%;height:90px;margin-top:10px;border:1px solid var(--line);border-radius:10px" placeholder="受け取ったデータを貼り付け"></textarea></div>`;$('#export').onclick=()=>{let x=btoa(unescape(encodeURIComponent(JSON.stringify({favorites:[...fav]}))));$('#data').value=x;navigator.clipboard?.writeText(x)};$('#import').onclick=()=>{try{let x=JSON.parse(decodeURIComponent(escape(atob($('#data').value.trim()))));fav=new Set(x.favorites||[]);save();alert('読み込みました');render()}catch(e){alert('共有データを確認してください')}}};save();render();
</script>
