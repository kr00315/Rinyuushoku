<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ふたりの離乳食ノート</title>
<style>
:root{--bg:#fffaf4;--card:#fff;--ink:#3a3028;--sub:#8d7c6d;--line:#eadfd2;--accent:#d9795f;--soft:#fff0e8;--green:#718b68}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,"Yu Gothic",sans-serif;line-height:1.6;padding-bottom:80px}header{padding:20px 18px 14px;background:linear-gradient(135deg,#fff7e9,#ffe8df);border-bottom:1px solid var(--line)}h1{margin:0;font-size:22px}header p{margin:3px 0 0;color:var(--sub);font-size:13px}main{max-width:700px;margin:auto;padding:14px}.search{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;font-size:16px;background:#fff}.chips{display:flex;gap:7px;overflow:auto;padding:12px 0}.chip,.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 12px;font-weight:700}.chip.on,.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:0 2px 8px #6d4b2610}.card h2{font-size:16px;line-height:1.35;margin:0 0 7px}.stage{font-size:12px;color:var(--green);font-weight:800}.tags{color:var(--sub);font-size:12px;margin:7px 0}.pick{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--accent);margin-top:9px}.pick input{width:22px;height:22px;accent-color:var(--accent)}.list{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}.group{margin:16px 0}.group h2{font-size:14px;color:var(--sub);margin:0 0 7px}.item{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--line)}.item:last-child{border:0}.item input{width:23px;height:23px;accent-color:var(--accent)}.item b{font-size:16px}.item small{display:block;color:var(--sub)}.empty{text-align:center;color:var(--sub);padding:38px 12px}.cook{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin:10px 0}.cook h2{margin:0 0 4px;font-size:19px}.cook h3{font-size:13px;color:var(--sub);margin:14px 0 5px}.cook li{margin:5px 0}.note{background:var(--soft);border-radius:12px;padding:10px;font-size:13px}nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:2}nav button{flex:1;border:0;background:none;padding:9px 4px;color:var(--sub);font-weight:800}nav button.on{color:var(--accent)}.count{color:var(--accent);font-size:13px}
</style><header><h1>ふたりの離乳食ノート <span id="count" class="count"></span></h1><p>作るものをチェックすると、買い物と調理がまとまります</p></header><main id="main"></main><nav><button id="pickTab" class="on">☑️<br>選ぶ</button><button id="shopTab">🛒<br>買い物</button><button id="cookTab">🍳<br>作る</button></nav>
<script>
const RECIPES=[{"id":"tofu-pancake","name":"豆腐でふわふわパンケーキ","stage":"9〜11か月頃","tags":["主食","手づかみ"],"ingredients":[["ホットケーキミックス","100g"],["絹ごし豆腐","70g"],["牛乳または豆乳","75ml"],["オリーブオイル","適量"]],"steps":["豆腐をボウルに入れ、粒がなくなるまでつぶす。","ホットケーキミックスと牛乳を加え、粉っぽさがなくなるまで混ぜる。","フライパンに油を薄くひき、弱火で小さめに流す。表面に気泡が出たら裏返す。","裏面も焼き、中まで火が通ったことを確認して食べやすく切る。"],"note":"画像の手順を補足。冷凍したものはラップをして電子レンジ600Wで30秒を目安に温め、中心まで熱くなったことを確認します。"},{"id":"salmon-hijiki","name":"鮭とひじきの炊き込みがゆ","stage":"9〜11か月頃","tags":["主食","冷凍ストック"],"ingredients":[["米","1/2合"],["生鮭","1切れ（60g）"],["乾燥芽ひじき","全量"],["にんじん","適量"],["いんげん","2本"],["昆布","3cm"],["水","450ml"],["しょうゆ","小さじ1/2"]],"steps":["乾燥ひじきは水で戻して洗い、にんじん・いんげんは小さく切る。","米を研いで材料と水、しょうゆを炊飯器に入れ、通常どおり炊く。","炊き上がったら鮭の皮・骨と昆布を取り除き、全体をほぐして混ぜる。","粗熱を取り、1食分ずつ小分けして冷凍する。"],"note":"鮭の骨は盛り付け後にも再確認。冷凍品は中心まで再加熱します。"},{"id":"apple-sweet-potato","name":"りんごとさつまいものおやき","stage":"9〜11か月頃","tags":["おやつ","手づかみ"],"ingredients":[["りんご","25g"],["さつまいも","100g"],["片栗粉","大さじ1"],["無塩バター","3g"]],"steps":["りんごは皮と芯を除いて細かく切り、さつまいもは皮を除いて小さく切る。","耐熱容器に入れてやわらかく加熱し、熱いうちにつぶす。","片栗粉を混ぜ、手でまとめられる固さにして小判形にする。","バターを薄くひいたフライパンで弱火で両面を焼き、中心まで火を通す。"],"note":"生地がゆるいときは片栗粉を少量追加。"},{"id":"chicken-potato","name":"鶏肉じゃが","stage":"9〜11か月頃","tags":["主菜","冷凍ストック"],"ingredients":[["鶏ひき肉","70g"],["じゃがいも","大さじ2"],["にんじん","大さじ2"],["玉ねぎ","大さじ1"],["いんげん","大さじ1"],["だし汁","100ml"],["しょうゆ","小さじ1/2"]],"steps":["野菜は皮を除き、火が通りやすいように小さく切る。","鍋にだし汁、野菜、鶏ひき肉を入れ、ひき肉をほぐしてから火にかける。","煮立ったらアクを取り、弱火で野菜が指でつぶせるまで煮る。","しょうゆを加えてひと煮立ちさせ、食べやすい大きさに整える。"],"note":"冷凍する場合は粗熱を取り、1食分ずつ小分けします。"},{"id":"cod-dashi","name":"たらのだし煮","stage":"9〜11か月頃","tags":["主菜","魚"],"ingredients":[["たら","全量（60g）"],["玉ねぎ","大さじ2"],["だし汁","75ml"],["青のり","適量"]],"steps":["たらは皮と骨を確認し、熱湯で中まで白くなるまでゆでる。","玉ねぎを細かく切り、だし汁でやわらかく煮る。","たらを加えてほぐし、汁気が多ければ少し煮詰める。","青のりは食べる直前に少量ふる。"],"note":"たらは骨が残りやすいため、ほぐしながら再確認します。"},{"id":"vegetable-miso","name":"野菜たっぷりみそ汁","stage":"9〜11か月頃","tags":["汁物","野菜"],"ingredients":[["にんじん","大さじ2"],["玉ねぎ","大さじ2"],["小松菜","全量（15g）"],["だし汁","130ml"],["みそ","小さじ1/2"]],"steps":["野菜をだし汁でやわらかく煮る。","火を止め、温度が下がったらみそを溶かす。"],"note":"下準備で余った野菜とだし汁を活用できます。"},{"id":"carrot-potage","name":"にんじんのポタージュ","stage":"9〜11か月頃","tags":["汁物","野菜"],"ingredients":[["にんじん","大さじ4"],["じゃがいも","大さじ2"],["玉ねぎ","大さじ1"],["牛乳または豆乳","80ml"],["ベビー用コンソメ","小さじ1"]],"steps":["野菜を薄く切り、耐熱容器または鍋でやわらかくなるまで加熱する。","牛乳または豆乳とコンソメを加え、沸騰させないよう温める。","ブレンダーまたはこし器でなめらかにし、食べやすい濃さに調整する。"],"note":"熱いままブレンダーを使う場合は機種の説明書に従います。"},{"id":"tofu-hamburg","name":"豆腐ハンバーグ","stage":"9〜11か月頃","tags":["主菜","手づかみ"],"ingredients":[["鶏ひき肉","60g"],["絹ごし豆腐","35g"],["玉ねぎ","大さじ2"],["にんじん","大さじ1"],["片栗粉","小さじ2"]],"steps":["玉ねぎとにんじんを細かく刻み、やわらかく加熱して冷ます。","豆腐、鶏ひき肉、野菜、片栗粉を粘りが出るまで混ぜる。","小判形に薄く成形し、油を薄くひいたフライパンで両面を焼く。","少量の水を加えてふたをし、弱火で蒸し焼きにする。中心まで火が通ったことを確認する。"]},{"id":"meatball","name":"赤ちゃんミートボール","stage":"9〜11か月頃","tags":["主菜","冷凍ストック"],"ingredients":[["豚ひき肉","120g"],["玉ねぎ","大さじ2"],["にんじん","大さじ1"],["ピーマン","小さじ1"],["絹ごし豆腐","35g"],["片栗粉","小さじ2"]],"steps":["野菜を細かく刻んでやわらかく加熱し、冷ます。","材料を粘りが出るまで混ぜ、濡らした手で小さく丸める。","フライパンで転がしながら表面を焼く。","水または野菜入りソースを加えてふたをし、弱火で中まで煮る。","割って中心まで火が通ったことを確認する。"],"note":"冷凍する場合は完全に冷ましてから小分けします。"},{"id":"corn-potage","name":"コーンポタージュ","stage":"9〜11か月頃","tags":["汁物","野菜"],"ingredients":[["コーン","100g"],["無塩バター","3g"],["牛乳または豆乳","120ml"],["青のり","適量"]],"steps":["コーンをやわらかく加熱し、薄皮が気になる場合は裏ごしする。","牛乳または豆乳、無塩バターを加えて温める。","ブレンダーでなめらかにし、食べる直前に青のりを少量ふる。"],"note":"沸騰させすぎず、食べる前に十分冷まします。"},{"id":"udon-napolitan","name":"うどんナポリタン","stage":"1歳〜1歳半頃","tags":["主食","麺"],"ingredients":[["ゆでうどん","1玉"],["豚肉","適量"],["玉ねぎ・にんじん","適量"],["ケチャップ","適量"]],"steps":["豚肉と野菜を子どもが食べやすい大きさに切る。","フライパンで豚肉を炒め、色が変わったら野菜を加えてやわらかくする。","短く切ったうどんとケチャップを加え、水少量でほぐしながら炒める。","豚肉の中心まで火が通ったことを確認する。"],"note":"うどんは長いままだと食べにくいため、盛り付け前に短く切ります。"},{"id":"japanese-yaki-udon","name":"和風焼きうどん","stage":"1歳〜1歳半頃","tags":["主食","麺"],"ingredients":[["ゆでうどん","1玉"],["豚肉","適量"],["玉ねぎ・にんじん","適量"],["しょうゆ","少々"]],"steps":["豚肉と野菜を食べやすく切り、豚肉から炒める。","野菜を加えてしんなりするまで炒める。","短く切ったうどんとだしを加え、ふたをして温める。","しょうゆを少量加えて混ぜ、具材の中心まで火が通ったら完成。"]},{"id":"shirasu-nori","name":"しらすと青のりのごはんおやき","stage":"1歳〜1歳半頃","tags":["主食","手づかみ"],"ingredients":[["ごはん","160g"],["しらす干し","30g"],["青のり","小さじ1/2"],["片栗粉","適量"]],"steps":["しらすは熱湯をかけて塩抜きし、水気を切る。","ごはん、しらす、青のり、片栗粉を混ぜる。","食べやすい厚さの小判形にしっかり成形する。","油を薄くひいたフライパンで弱火で両面を焼き、表面が固まるまで加熱する。"],"note":"画像に加えて塩抜きと成形の補足を記載しています。"},{"id":"tuna-ketchup-rice","name":"ツナケチャップライスおやき","stage":"1歳〜1歳半頃","tags":["主食","手づかみ"],"ingredients":[["ごはん","160g"],["ツナ水煮","35g"],["玉ねぎ","40g"],["ケチャップ","小さじ2"],["片栗粉","適量"]],"steps":["ツナは汁気を切り、玉ねぎはみじん切りにする。","玉ねぎをやわらかく加熱し、ツナとケチャップを加えて混ぜる。","ごはんと片栗粉を加えて混ぜ、食べやすい形にする。","フライパンで弱火で両面を焼き、崩れないよう冷ましてから切る。"]},{"id":"tororo-rice","name":"とろろごはんおやき","stage":"1歳〜1歳半頃","tags":["主食","手づかみ"],"ingredients":[["ごはん","160g"],["長いも","80g"],["青のり","小さじ1/2"],["しょうゆ","小さじ1/2"]],"steps":["長いもの皮をむいてすりおろす。","ごはん、長いも、青のり、しょうゆを混ぜる。","スプーンでフライパンに落として平らにし、弱火で焼く。","片面が固まったら裏返し、両面に焼き色がついて中心まで温まったら冷ます。"]},{"id":"wrapped-shumai","name":"包まないシュウマイ","stage":"1歳〜1歳半頃","tags":["主菜","冷凍ストック"],"ingredients":[["豚ひき肉","150g"],["シュウマイの皮","5枚"],["玉ねぎ","80g"],["片栗粉","大さじ1"]],"steps":["玉ねぎをみじん切りにし、片栗粉をまぶす。","豚ひき肉と混ぜ、粘りが出るまでこねて小さく丸める。","シュウマイの皮を細切りにし、肉だねの表面にまぶす。","フライパンに並べ、水を加えてふたをし、蒸し焼きにする。割って中心まで火が通ったことを確認する。"],"note":"画像では水を加えて蒸し焼きにする手順が確認できます。"},{"id":"pumpkin-croquette","name":"揚げないかぼちゃコロッケ","stage":"1歳〜1歳半頃","tags":["主菜","手づかみ"],"ingredients":[["かぼちゃ","300g"],["玉ねぎ","40g"],["パン粉","適量"],["油","少々"]],"steps":["かぼちゃは皮と種を除いてやわらかく加熱し、熱いうちにつぶす。","玉ねぎをみじん切りにしてやわらかく炒め、かぼちゃと混ぜる。","食べやすい大きさに成形し、パン粉をまぶす。","油を薄くひいたフライパンで転がしながら焼き、衣が固まったら冷ます。"],"note":"画像の手順を補足。熱いまま食べさせず、中心まで冷ましてから提供します。"}],KEY='baby.selected.v2';let selected=new Set(JSON.parse(localStorage.getItem(KEY)||'[]')),view='pick',stage=null,q='';const $=s=>document.querySelector(s),esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function save(){localStorage.setItem(KEY,JSON.stringify([...selected]));$('#count').textContent=selected.size?`・${selected.size}品選択`:''}function toggle(id){selected.has(id)?selected.delete(id):selected.add(id);save();render()}function cards(list){return `<div class="grid">${list.map(r=>`<article class="card"><div class="stage">${r.stage}</div><h2>${r.name}</h2><div class="tags">${r.tags.map(t=>'#'+t).join('　')}</div><label class="pick"><input type="checkbox" data-pick="${r.id}" ${selected.has(r.id)?'checked':''}> 作るレシピに追加</label></article>`).join('')}</div>`}function renderPick(){let list=RECIPES.filter(r=>(!stage||r.stage===stage)&&(!q||r.name.includes(q)||r.tags.join().includes(q)));$('#main').innerHTML=`<input class="search" placeholder="レシピ名や食材で検索" value="${esc(q)}"><div class="chips"><button class="chip ${!stage?'on':''}" data-stage="">すべて</button>${[...new Set(RECIPES.map(r=>r.stage))].map(s=>`<button class="chip ${stage===s?'on':''}" data-stage="${s}">${s}</button>`).join('')}</div>${list.length?cards(list):'<div class="empty">該当するレシピがありません</div>'}`;$('.search').oninput=e=>{q=e.target.value;renderPick()}}function shopping(){if(!selected.size){$('#main').innerHTML='<div class="empty">「選ぶ」画面で作るレシピにチェックを入れてください。</div>';return}let m=new Map();for(const id of selected){let r=RECIPES.find(x=>x.id===id);for(const [item,qty] of r.ingredients){let e=m.get(item)||{qty:[],src:[]};e.qty.push(qty);e.src.push(r.name);m.set(item,e)}}let html='';for(const [item,e] of m){html+=`<div class="item"><input type="checkbox"><div><b>${item}　${e.qty.join(' + ')}</b><small>${[...new Set(e.src)].join(' / ')}</small></div></div>`}$('#main').innerHTML=`<h2>買い物リスト <span class="count">${m.size}品</span></h2><div class="list">${html}</div><div class="note" style="margin-top:12px">買い物が終わった食材にチェックを入れられます。</div>`}function cooking(){let list=RECIPES.filter(r=>selected.has(r.id));$('#main').innerHTML=list.length?`<h2>今日作るレシピ <span class="count">${list.length}品</span></h2>${list.map(r=>`<article class="cook"><div class="stage">${r.stage}</div><h2>${r.name}</h2><h3>材料</h3><ul>${r.ingredients.map(i=>`<li>${i[0]}：<b>${i[1]}</b></li>`).join('')}</ul><h3>作り方</h3><ol>${r.steps.map(s=>`<li>${s}</li>`).join('')}</ol>${r.note?`<div class="note">📝 ${r.note}</div>`:''}</article>`).join('')}`:'<div class="empty">「選ぶ」画面で作るレシピにチェックを入れてください。</div>'}function render(){document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));$(`#${view==='pick'?'pick':view}Tab`).classList.add('on');view==='pick'?renderPick():view==='shop'?shopping():cooking()}document.body.onclick=e=>{let t=e.target.closest('[data-pick],[data-stage]');if(!t)return;if(t.dataset.pick)toggle(t.dataset.pick);if(t.dataset.stage!==undefined){stage=t.dataset.stage||null;renderPick()}};$('#pickTab').onclick=()=>{view='pick';render()};$('#shopTab').onclick=()=>{view='shop';render()};$('#cookTab').onclick=()=>{view='cook';render()};save();render();
</script>
